name: PDF
on: [push]

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: docs/paper.md
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: docs/paper.pdf
